<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tablas de Multiplicar Dinámicas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Generador de Tablas</h1>

        <div class="controles">
            <label for="numUsuario">¿Hasta qué número quieres generar?</label>
            <input type="number" id="numUsuario" min="1" placeholder="Ej. 12">
            <button id="btnGenerar">Generar</button>
        </div>

        <div id="contenedor-tablas" class="grid"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
